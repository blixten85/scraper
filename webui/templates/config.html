<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfiguration - Web Scraper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Web Scraper Pro</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Dashboard</a>
                <a class="nav-link active" href="/config">Konfiguration</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>Konfiguration</h1>
        
        <div class="alert alert-info">
            <i class="bi bi-info-circle"></i>
            Konfigurationen hanteras via API:et. 
            <a href="/api/docs" target="_blank">Öppna API-dokumentation</a>
        </div>

        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Aktiva konfigurationer</h5>
            </div>
            <div class="card-body">
                <div id="configsList">Laddar...</div>
            </div>
        </div>
    </div>

    <script>
        fetch('/api/configs')
            .then(r => r.json())
            .then(configs => {
                if (configs.length === 0) {
                    document.getElementById('configsList').innerHTML = 
                        '<p class="text-muted">Inga konfigurationer hittades. Lägg till via API:et.</p>';
                } else {
                    let html = '<table class="table"><thead><tr><th>Namn</th><th>URL</th><th>Aktiv</th></tr></thead><tbody>';
                    configs.forEach(c => {
                        html += `<tr><td>${c.name}</td><td>${c.base_url}</td><td>${c.enabled ? "✅" : "❌"}</td></tr>`;
                    });
                    html += '</tbody></table>';
                    document.getElementById('configsList').innerHTML = html;
                }
            })
            .catch(err => {
                document.getElementById('configsList').innerHTML = 
                    '<p class="text-danger">Kunde inte ladda konfigurationer</p>';
            });
    </script>
</body>
</html>
