<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Scraper - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">🕷️ Web Scraper</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="/">Dashboard</a>
                <a class="nav-link" href="/config">Configuration</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>Dashboard</h1>
        
        <!-- Stats Cards -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card bg-primary text-white">
                    <div class="card-body">
                        <h5>Products</h5>
                        <h2 id="total-products">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-success text-white">
                    <div class="card-body">
                        <h5>Updated (24h)</h5>
                        <h2 id="updated-24h">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-info text-white">
                    <div class="card-body">
                        <h5>Active configurations</h5>
                        <h2 id="active-configs">-</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="card mb-4">
            <div class="card-header">Actions</div>
            <div class="card-body">
                <button class="btn btn-primary" onclick="triggerScrape()">
                    <i class="bi bi-play-fill"></i> Start scraping now
                </button>
                <a href="/config" class="btn btn-secondary">
                    <i class="bi bi-gear"></i> Configuration
                </a>
                <button class="btn btn-success" onclick="exportData()">
                    <i class="bi bi-download"></i> Export CSV
                </button>
            </div>
        </div>

        <!-- Products Table -->
        <div class="card">
            <div class="card-header d-flex justify-content-between">
                <span>Latest products</span>
                <input type="text" id="searchInput" class="form-control form-control-sm w-25" 
                       placeholder="Search..." onkeyup="loadProducts()">
            </div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Last updated</th>
                        </tr>
                    </thead>
                    <tbody id="productsTable">
                        <tr><td colspan="3" class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Load stats
        fetch('/api/stats')
            .then(r => r.json())
            .then(stats => {
                document.getElementById('total-products').textContent = stats.total_products || 0;
                document.getElementById('updated-24h').textContent = stats.updated_24h || 0;
                document.getElementById('active-configs').textContent = stats.active_configs || 0;
            })
            .catch(err => console.error('Stats error:', err));

        // Load products
        function loadProducts() {
            const search = document.getElementById('searchInput').value;
            fetch(`/api/products?limit=50&search=${encodeURIComponent(search)}`)
                .then(r => r.json())
                .then(data => {
                    const tbody = document.getElementById('productsTable');
                    if (data.products.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="3" class="text-center">No products</td></tr>';
                        return;
                    }
                    tbody.innerHTML = data.products.map(p => `
                        <tr>
                            <td><a href="${p.url}" target="_blank">${escapeHtml(p.title)}</a></td>
                            <td>${p.current_price} kr</td>
                            <td>${formatDate(p.last_updated)}</td>
                        </tr>
                    `).join('');
                });
        }

        function triggerScrape() {
            if (!confirm('Start scraping now?')) return;
            fetch('/api/scrape', { method: 'POST' })
                .then(r => r.json())
                .then(data => alert(data.message || 'Started!'))
                .catch(err => alert('Error: ' + err));
        }

        function exportData() {
            window.location.href = '/api/export/csv';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            return new Date(dateString).toLocaleString('en-US');
        }

        // Initial load
        loadProducts();
    </script>
</body>
</html>
