global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'scraper'
    static_configs:
      - targets: ['scraper_engine:5001']
    metrics_path: /metrics

  - job_name: 'api'
    static_configs:
      - targets: ['scraper_api:8000']
    metrics_path: /metrics

  - job_name: 'traefik'
    static_configs:
      - targets: ['scraper_traefik:8080']
