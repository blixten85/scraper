version: "3.9"

services:
  postgres-init:
    image: alpine:3
    container_name: scraper_db_init
    restart: "no"
    command: ["chown", "-R", "70:70", "/pgdata"]
    volumes:
      - ${DOCKER}/scraper/postgres:/pgdata

  postgres:
    image: postgres:16-alpine
    container_name: scraper_db
    restart: unless-stopped
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    environment:
      TZ: ${TZ}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/scraper_password
    volumes:
      - ${DOCKER}/scraper/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper"]
      interval: 10s
      timeout: 5s
      retries: 5
    secrets:
      - scraper_password
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  pgdump:
    image: postgres:16-alpine
    container_name: scraper_pgdump
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command: |
      while true; do
        export PGPASSWORD
        PGPASSWORD=$(cat /run/secrets/scraper_password)
        pg_dump -h postgres -U scraper scraper -Fc \
          -f "/backup/scraper_$(date +%Y%m%d_%H%M).dump" \
          && find /backup -name '*.dump' -mtime +7 -delete \
          && echo "[$(date '+%T')] pg_dump ok" \
          || echo "[$(date '+%T')] pg_dump failed, retrying in 1h" && sleep 3600 && continue
        sleep 86400
      done
    secrets:
      - scraper_password
    volumes:
      - ${DOCKER}/scraper/backup:/backup
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  scraper:
    image: ghcr.io/blixten85/scraper:latest
    container_name: scraper
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: ${TZ}
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD_FILE: /run/secrets/scraper_password
      API_KEY_FILE: /run/secrets/api_key
      DISCORD_WEBHOOK_FILE: /run/secrets/discord_webhook
      ALLOWED_ORIGINS: "https://scraper.${DOMAIN}"
      CONCURRENT_PAGES: ${CONCURRENT_PAGES}
      HEADLESS: ${HEADLESS}
      SCRAPE_INTERVAL: ${SCRAPE_INTERVAL}
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      PROXY_URL: ${PROXY_URL}
      CHECK_INTERVAL: ${ALERT_CHECK_INTERVAL}
      MIN_DROP_PERCENT: ${MIN_DROP_PERCENT}
      MIN_DROP_AMOUNT: ${MIN_DROP_AMOUNT}
      COOLDOWN_HOURS: ${COOLDOWN_HOURS}
    volumes:
      - ${DOCKER}/scraper/logs:/logs
      - ${DOCKER}/scraper/playwright-cache:/ms-playwright
    secrets:
      - scraper_password
      - api_key
      - discord_webhook
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      swag: "enable"
      swag_address: "scraper"
      swag_port: "3000"
      swag_url: "scraper.${DOMAIN}"

secrets:
  scraper_password:
    file: ${CONFIG}/.secrets/scraper_password
  api_key:
    file: ${CONFIG}/.secrets/api_key
  discord_webhook:
    file: ${CONFIG}/.secrets/discord_webhook
