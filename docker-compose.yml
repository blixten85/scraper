version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    user: root
    entrypoint: ["/bin/sh", "-c"]
    # Runs as root so it can fix volume permissions before dropping to the
    # postgres user (uid 70). Docker creates mounted volumes as root:root,
    # which postgres refuses to use. The chown runs on every startup.
    # To change this behaviour, replace the command block below.
    command:
      - |
        chown -R 70:70 /var/lib/postgresql/data
        if [ ! -f /credentials/db_password ]; then
          pw=$$(head -c 16 /dev/urandom | od -An -tx1 | tr -d ' \n')
          echo "$$pw" > /credentials/db_password
          echo ""
          echo "============================================"
          echo "  Database password generated:"
          echo "  $$pw"
          echo "  (stored in: DOCKER/scraper/credentials/db_password)"
          echo "============================================"
          echo ""
        fi
        export POSTGRES_PASSWORD=$$(cat /credentials/db_password)
        exec su-exec postgres docker-entrypoint.sh postgres
    environment:
      TZ: ${TZ}
      POSTGRES_DB: scraper
      POSTGRES_USER: scraper
    volumes:
      - ${DOCKER}/scraper/postgres:/var/lib/postgresql/data
      - ${DOCKER}/scraper/credentials:/credentials
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  scraper:
    image: ghcr.io/blixten85/scraper:latest
    container_name: scraper
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: ${TZ}
      DB_HOST: postgres
      DB_PASSWORD_FILE: /credentials/db_password
      API_KEY_FILE: /credentials/api_key
      DISCORD_WEBHOOK_FILE: /credentials/discord_webhook
    volumes:
      - ${DOCKER}/scraper/logs:/logs
      - ${DOCKER}/scraper/playwright-cache:/ms-playwright
      - ${DOCKER}/scraper/credentials:/credentials
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      swag: "enable"
      swag_address: "scraper"
      swag_port: "3000"
      swag_url: "scraper.${DOMAIN}"
