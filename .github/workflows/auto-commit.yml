name: Auto Commit Documentation

on:
  push:
    paths:
      - '**.md'
      - '**.py'
      - '**.yml'
      - '**.yaml'
      - '**.json'
      - '**.sh'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '!**.github/workflows/**'
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2
      
      - name: Check and amend commit message
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          COMMIT_MSG=$(git log -1 --pretty=%B)
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | head -5 | tr '\n' ', ' | sed 's/,$//')
          
          if echo "$COMMIT_MSG" | grep -qE "docs:|feat:|fix:|ci:|refactor:|test:|chore:"; then
            echo "Commit message already descriptive, skipping amend"
          else
            if echo "$CHANGED_FILES" | grep -q "\.md"; then
              PREFIX="docs"
            elif echo "$CHANGED_FILES" | grep -q "\.py"; then
              PREFIX="feat"
            elif echo "$CHANGED_FILES" | grep -q "\.yml\|\.yaml\|Dockerfile"; then
              PREFIX="ci"
            else
              PREFIX="chore"
            fi
            
            git commit --amend -m "$PREFIX: update $CHANGED_FILES [skip ci]"
            git push --force-with-lease
          fi
