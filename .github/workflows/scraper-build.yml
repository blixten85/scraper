name: Scraper Build

on:
  push:
    paths:
      - 'scraper/**'
      - '!**.md'
  pull_request:
    paths:
      - 'scraper/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build scraper image
        run: |
          cd scraper
          docker build -t scraper-engine:latest .
      
      - name: Verify build
        run: docker images | grep scraper-engine
