name: API Build

on:
  push:
    paths:
      - 'api/**'
      - '!**.md'
  pull_request:
    paths:
      - 'api/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build API image
        run: |
          cd api
          docker build -t scraper-api:latest .
      
      - name: Verify build
        run: docker images | grep scraper-api
