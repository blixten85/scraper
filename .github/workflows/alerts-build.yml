name: Alerts Build

on:
  push:
    paths:
      - 'alerts/**'
      - '!**.md'
  pull_request:
    paths:
      - 'alerts/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Alerts image
        run: |
          cd alerts
          docker build -t scraper-alerts:latest .
      
      - name: Verify build
        run: docker images | grep scraper-alerts
