name: WebUI Build

on:
  push:
    paths:
      - 'webui/**'
      - '!**.md'
  pull_request:
    paths:
      - 'webui/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build WebUI image
        run: |
          cd webui
          docker build -t scraper-webui:latest .
      
      - name: Verify build
        run: docker images | grep scraper-webui
