name: Auto-Update PRs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find open PRs with auto-rebase label (excluding Dependabot)
        id: find-prs
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            const updatable = prs.filter(pr =>
              pr.user.login !== 'dependabot[bot]' &&
              pr.labels.some(label => label.name === 'auto-rebase' || label.name === 'auto-merge')
            ).map(pr => pr.number);

            return updatable;

      - name: Update PR branches
        uses: actions/github-script@v7
        with:
          script: |
            const prNumbers = ${{ steps.find-prs.outputs.result }};

            for (const prNumber of prNumbers) {
              try {
                await github.rest.pulls.updateBranch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber
                });
                console.log(`Updated PR #${prNumber}`);
              } catch (error) {
                console.log(`Could not update PR #${prNumber}: ${error.message}`);
              }
            }
