name: Dependency Submission

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Submit dependencies
        uses: advanced-security/python-dependency-submission-action@v0.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
