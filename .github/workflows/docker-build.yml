name: Build and Push Images

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: blixten85/scraper

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - context: scraper
            suffix: ""
          - context: alerts
            suffix: "-alerts"
          - context: api
            suffix: "-api"
          - context: webui
            suffix: "-webui"

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}${{ matrix.suffix }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}${{ matrix.suffix }}:${{ github.sha }}
