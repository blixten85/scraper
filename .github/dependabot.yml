version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/scraper"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Stockholm"
    labels:
      - "dependencies"
      - "auto-merge"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/webui"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Stockholm"
    labels:
      - "dependencies"
      - "auto-merge"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Stockholm"
    labels:
      - "dependencies"
      - "auto-merge"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/alerts"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Stockholm"
    labels:
      - "dependencies"
      - "auto-merge"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Stockholm"
    labels:
      - "ci"
      - "auto-merge"
    open-pull-requests-limit: 10
