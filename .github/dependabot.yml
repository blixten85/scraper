# .github/dependabot.yml
version: 2
updates:
  # ============================================
  # DOCKER - Alla uppdateringar i EN PR (veckovis)
  # ============================================
  - package-ecosystem: "docker"
    directories:
      - "/scraper"
      - "/api"
      - "/webui"
      - "/alerts"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "docker"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
      - "auto-merge"
    groups:
      all-docker:
        patterns:
          - "*"
    # Skapa separata PR för säkerhetsuppdateringar
    target-branch: "main"

  # ============================================
  # DOCKER - Säkerhetsuppdateringar (dagligen)
  # ============================================
  - package-ecosystem: "docker"
    directories:
      - "/scraper"
      - "/api"
      - "/webui"
      - "/alerts"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "security"
      include: "scope"
    labels:
      - "security"
      - "docker"
      - "auto-merge"
      - "critical"
    # Endast säkerhetsuppdateringar
    groups:
      docker-security:
        applies-to: security-updates
        patterns:
          - "*"
    target-branch: "main"

  # ============================================
  # PYTHON/PIP - Alla uppdateringar i EN PR (veckovis)
  # ============================================
  - package-ecosystem: "pip"
    directories:
      - "/scraper"
      - "/api"
      - "/webui"
      - "/alerts"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 1
    versioning-strategy: increase-if-necessary
    commit-message:
      prefix: "pip"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
      - "auto-merge"
    groups:
      all-python:
        patterns:
          - "*"
    ignore:
      - dependency-name: "playwright"
        versions: [">=1.41.0"]
    # Auto-merge endast utvecklingsberoenden (säkrare approach)
    # Kommentera ut raderna nedan om du vill auto-merga ALLA Python-uppdateringar
    # allow:
    #   - dependency-type: "development"
    target-branch: "main"

  # ============================================
  # PYTHON/PIP - Säkerhetsuppdateringar (dagligen)
  # ============================================
  - package-ecosystem: "pip"
    directories:
      - "/scraper"
      - "/api"
      - "/webui"
      - "/alerts"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    commit-message:
      prefix: "security"
      include: "scope"
    labels:
      - "security"
      - "python"
      - "auto-merge"
      - "critical"
    # Endast säkerhetsuppdateringar
    groups:
      python-security:
        applies-to: security-updates
        patterns:
          - "*"
    target-branch: "main"

  # ============================================
  # GITHUB ACTIONS - Månadsvis
  # ============================================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"
      - "github-actions"
      - "auto-merge"
    groups:
      all-actions:
        patterns:
          - "*"
    target-branch: "main"

# ============================================
# REGISTER INFO (valfritt men rekommenderat)
# ============================================
registries:
  docker-hub:
    type: docker-registry
    url: https://registry.hub.docker.com
    username: ${{ secrets.DOCKERHUB_USERNAME }}
    password: ${{ secrets.DOCKERHUB_TOKEN }}
