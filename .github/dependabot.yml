# .github/dependabot.yml
version: 2
updates:
  # ALLA Docker-uppdateringar i EN PR
  - package-ecosystem: "docker"
    directories:
      - "/scraper"
      - "/api"
      - "/webui"
      - "/alerts"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "docker"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
      - "auto-merge"
    groups:
      all-docker:
        patterns:
          - "*"

  # ALLA Python-uppdateringar i EN PR
  - package-ecosystem: "pip"
    directories:
      - "/scraper"
      - "/api"
      - "/webui"
      - "/alerts"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 1
    versioning-strategy: increase-if-necessary
    commit-message:
      prefix: "pip"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
      - "auto-merge"
    groups:
      all-python:
        patterns:
          - "*"
    ignore:
      - dependency-name: "playwright"
        versions: [">=1.41.0"]

  # GitHub Actions i EN PR
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"
      - "auto-merge"
    groups:
      all-actions:
        patterns:
          - "*"
